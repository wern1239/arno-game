<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 185">
  <defs>
    <radialGradient id="globeRad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="55%" stop-color="#D4A000"/>
      <stop offset="100%" stop-color="#6B4400"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B4400"/>
      <stop offset="45%" stop-color="#D4A000"/>
      <stop offset="100%" stop-color="#6B4400"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A3800"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#5A3800"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#0A3D0C"/>
    </linearGradient>
  </defs>

  <!-- Globe -->
  <circle cx="50" cy="40" r="35" fill="url(#globeRad)"/>
  <!-- Globe highlight -->
  <ellipse cx="39" cy="29" rx="11" ry="8" fill="white" opacity="0.18"/>
  <!-- Globe grid lines -->
  <circle cx="50" cy="40" r="35" fill="none" stroke="#6B4400" stroke-width="0.7" opacity="0.4"/>
  <ellipse cx="50" cy="40" rx="35" ry="13" fill="none" stroke="#6B4400" stroke-width="0.6" opacity="0.35"/>
  <ellipse cx="50" cy="40" rx="35" ry="13" fill="none" stroke="#6B4400" stroke-width="0.6" opacity="0.25" transform="rotate(55 50 40)"/>
  <ellipse cx="50" cy="40" rx="17" ry="35" fill="none" stroke="#6B4400" stroke-width="0.6" opacity="0.3"/>
  <line x1="15" y1="40" x2="85" y2="40" stroke="#6B4400" stroke-width="0.6" opacity="0.3"/>

  <!-- Left figure body -->
  <path d="M24,130 L37,130 Q39,118 39,108 Q38,100 35,97 Q32,100 30,108 Q28,118 24,130 Z" fill="url(#bodyGrad)"/>
  <!-- Left figure head -->
  <circle cx="35" cy="92" r="5.5" fill="url(#bodyGrad)"/>
  <!-- Left arm raised toward globe -->
  <path d="M38,105 Q44,94 47,78" stroke="#D4A000" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left arm inner (toward stem) -->
  <path d="M33,108 Q41,120 45,129" stroke="#D4A000" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Right figure body -->
  <path d="M76,130 L63,130 Q61,118 61,108 Q62,100 65,97 Q68,100 70,108 Q72,118 76,130 Z" fill="url(#bodyGrad)"/>
  <!-- Right figure head -->
  <circle cx="65" cy="92" r="5.5" fill="url(#bodyGrad)"/>
  <!-- Right arm raised toward globe -->
  <path d="M62,105 Q56,94 53,78" stroke="#D4A000" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right arm inner (toward stem) -->
  <path d="M67,108 Q59,120 55,129" stroke="#D4A000" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Centre stem between figures -->
  <rect x="41" y="129" width="18" height="23" rx="3" fill="url(#stemGrad)"/>
  <rect x="41" y="132" width="18" height="2" rx="1" fill="#FFE87A" opacity="0.35"/>
  <rect x="41" y="143" width="18" height="2" rx="1" fill="#4A2800" opacity="0.35"/>

  <!-- Gold band -->
  <rect x="37" y="152" width="26" height="5" rx="2.5" fill="url(#stemGrad)"/>

  <!-- Upper malachite tier -->
  <rect x="20" y="157" width="60" height="13" rx="3" fill="url(#baseGrad)"/>
  <rect x="20" y="157" width="60" height="2.5" rx="1.5" fill="#43A047" opacity="0.5"/>
  <rect x="20" y="167.5" width="60" height="2.5" rx="1.5" fill="#062008" opacity="0.6"/>

  <!-- Lower malachite tier -->
  <rect x="10" y="170" width="80" height="14" rx="4" fill="url(#baseGrad)"/>
  <rect x="10" y="170" width="80" height="2.5" rx="2" fill="#43A047" opacity="0.5"/>
  <rect x="10" y="181.5" width="80" height="2.5" rx="2" fill="#062008" opacity="0.6"/>
</svg>
